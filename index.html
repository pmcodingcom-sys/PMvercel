<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMCoding</title>

    <link rel="icon" type="image/png" href="https://img5.pic.in.th/file/secure-sv1/logo-PMCoding.png">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body{
            font-family:'Kanit',sans-serif;
            margin:0;
            padding:0;
            background:#f3f4f6;
        }

        .loading{
            position:fixed;
            inset:0;
            display:flex;
            align-items:center;
            justify-content:center;
            background:white;
            z-index:9999;
            flex-direction:column;
        }

        .spinner{
            width:55px;
            height:55px;
            border:5px solid #e5e7eb;
            border-top:5px solid #ef4444;
            border-radius:50%;
            animation:spin 1s linear infinite;
        }

        @keyframes spin{
            100%{
                transform:rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <!-- Loading -->
    <div id="loading" class="loading">
        <div class="spinner"></div>
        <p class="mt-4 text-gray-700 text-lg font-medium">
            กำลังเปิดระบบ...
        </p>
    </div>

    <!-- Modal -->
    <div id="inAppBrowserModal"
        class="fixed inset-0 bg-black/70 z-50 hidden items-center justify-center p-4">

        <div class="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl text-center">

            <div class="mb-4">
                <i class="fa-solid fa-camera text-red-500 text-6xl"></i>
            </div>

            <h2 class="text-2xl font-bold text-gray-800 mb-2">
                กรุณาเปิดผ่านเบราว์เซอร์หลัก
            </h2>

            <p class="text-gray-600 text-sm leading-7 mb-6">
                ระบบนี้ต้องใช้กล้องของอุปกรณ์<br>
                กรุณาเปิดผ่าน Chrome หรือ Safari<br>
                เพื่อให้สามารถใช้งานกล้องได้ปกติ
            </p>

            <div class="space-y-3">

                <button id="openBrowserBtn"
                    class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-semibold transition">
                    เปิดในเบราว์เซอร์
                </button>

                <button id="copyBtn"
                    class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 py-3 rounded-xl font-semibold transition">
                    คัดลอกลิงก์
                </button>

                <div id="copySuccess"
                    class="hidden text-green-600 text-sm pt-2">
                    คัดลอกลิงก์แล้ว
                </div>

            </div>

        </div>
    </div>

<script>

document.addEventListener('DOMContentLoaded', () => {

    // =========================
    // URL APPS SCRIPT
    // =========================

    const WEB_APP_URL =
    'https://script.google.com/macros/s/AKfycbwp5kUSZJ1CMnUfnsC4keqk39JCu2Vry23GPok2ZRFzuS_EqKg6b8wmt7BLVbAobhcH/exec';


    // =========================
    // CHECK IN-APP BROWSER
    // =========================

    function isInAppBrowser() {

        const ua = navigator.userAgent || '';

        return /FBAN|FBAV|Instagram|Line|LIFF|TikTok|Twitter|MicroMessenger|Snapchat|Threads/i.test(ua);
    }


    // =========================
    // HIDE LOADING
    // =========================

    function hideLoading() {
        document.getElementById('loading').style.display = 'none';
    }


    // =========================
    // OPEN DIRECT
    // =========================

    function openDirectly() {

        hideLoading();

        // เปิดตรง ไม่ใช้ iframe
        window.location.href = WEB_APP_URL;
    }


    // =========================
    // SHOW MODAL
    // =========================

    function showModal() {

        hideLoading();

        const modal = document.getElementById('inAppBrowserModal');

        modal.classList.remove('hidden');
        modal.classList.add('flex');

        const openBtn = document.getElementById('openBrowserBtn');
        const copyBtn = document.getElementById('copyBtn');
        const copySuccess = document.getElementById('copySuccess');

        openBtn.onclick = () => {

            // Android Chrome
            const androidIntent =
            `intent://${window.location.host}${window.location.pathname}#Intent;scheme=https;package=com.android.chrome;end`;

            // Android
            if (/Android/i.test(navigator.userAgent)) {

                window.location.href = androidIntent;

            } else {

                // iPhone/iPad
                window.open(window.location.href, '_blank');
            }
        };

        copyBtn.onclick = async () => {

            try {

                await navigator.clipboard.writeText(window.location.href);

                copySuccess.classList.remove('hidden');

                setTimeout(() => {

                    copySuccess.classList.add('hidden');

                }, 2000);

            } catch (err) {

                alert('ไม่สามารถคัดลอกลิงก์ได้');
            }
        };
    }


    // =========================
    // START
    // =========================

    if (isInAppBrowser()) {

        showModal();

    } else {

        openDirectly();
    }

});
</script>

</body>
</html>
