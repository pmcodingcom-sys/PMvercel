<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Camera App</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Kanit',sans-serif;
    background:#f3f4f6;
}
video,canvas{
    border-radius:20px;
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-5">

<div class="bg-white p-6 rounded-3xl shadow-xl w-full max-w-xl">

    <h1 class="text-3xl font-bold text-center mb-6">
        เปิดกล้องด้วย GitHub Pages
    </h1>

    <!-- VIDEO -->
    <video
        id="video"
        autoplay
        playsinline
        class="w-full bg-black">
    </video>

    <!-- CANVAS -->
    <canvas
        id="canvas"
        class="hidden">
    </canvas>

    <!-- PREVIEW -->
    <img
        id="preview"
        class="mt-4 rounded-2xl hidden w-full">

    <!-- BUTTON -->
    <div class="grid grid-cols-2 gap-4 mt-6">

        <button
            onclick="startCamera()"
            class="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl text-lg">

            เปิดกล้อง
        </button>

        <button
            onclick="capturePhoto()"
            class="bg-green-600 hover:bg-green-700 text-white py-3 rounded-2xl text-lg">

            ถ่ายรูป
        </button>

    </div>

    <button
        onclick="uploadPhoto()"
        class="mt-4 w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-2xl text-lg">

        ส่งเข้า Apps Script
    </button>

    <div id="status"
        class="text-center mt-4 text-gray-700">
    </div>

</div>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const preview = document.getElementById('preview');

let imageBase64 = '';


// =========================
// เปิดกล้อง
// =========================

async function startCamera(){

    try{

        const stream =
        await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:'environment'
            },
            audio:false
        });

        video.srcObject = stream;

    }catch(err){

        alert('ไม่สามารถเปิดกล้องได้ : ' + err.message);
    }
}


// =========================
// ถ่ายรูป
// =========================

function capturePhoto(){

    const ctx = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video,0,0);

    imageBase64 = canvas.toDataURL('image/jpeg',0.8);

    preview.src = imageBase64;
    preview.classList.remove('hidden');
}


// =========================
// ส่งเข้า Apps Script
// =========================

async function uploadPhoto(){

    if(!imageBase64){

        alert('กรุณาถ่ายรูปก่อน');
        return;
    }

    document.getElementById('status').innerHTML =
    'กำลังอัปโหลด...';

    try{

        const response = await fetch(
        'https://script.google.com/macros/s/AKfycbwp5kUSZJ1CMnUfnsC4keqk39JCu2Vry23GPok2ZRFzuS_EqKg6b8wmt7BLVbAobhcH/exec',
        {
            method:'POST',
            body:JSON.stringify({
                image:imageBase64
            })
        });

        const result = await response.text();

        document.getElementById('status').innerHTML =
        'อัปโหลดสำเร็จ';

        console.log(result);

    }catch(err){

        document.getElementById('status').innerHTML =
        'อัปโหลดไม่สำเร็จ';

        console.error(err);
    }
}

</script>

</body>
</html>
