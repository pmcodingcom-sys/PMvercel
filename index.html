<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PMCoding Camera Bridge</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Kanit',sans-serif;
    background:#f3f4f6;
}

video,
canvas,
img{
    border-radius:24px;
}

.camera-box{
    box-shadow:
    0 10px 30px rgba(0,0,0,.08);
}
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="camera-box bg-white w-full max-w-xl rounded-3xl p-5">

    <!-- TITLE -->
    <div class="text-center mb-5">

        <div class="text-5xl mb-3">
            📷
        </div>

        <h1 class="text-3xl font-bold text-gray-800">
            Camera Bridge
        </h1>

        <p class="text-gray-500 mt-2">
            GitHub Pages สำหรับเปิดกล้องแทน Apps Script
        </p>

    </div>

    <!-- VIDEO -->
    <video
        id="video"
        autoplay
        playsinline
        muted
        class="w-full bg-black aspect-video object-cover">
    </video>

    <!-- CANVAS -->
    <canvas
        id="canvas"
        class="hidden">
    </canvas>

    <!-- PREVIEW -->
    <img
        id="preview"
        class="hidden mt-4 w-full object-cover">

    <!-- BUTTONS -->
    <div class="grid grid-cols-2 gap-4 mt-5">

        <button
            id="btnStart"
            class="bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-2xl text-lg font-semibold transition">

            เปิดกล้อง
        </button>

        <button
            id="btnCapture"
            class="bg-green-600 hover:bg-green-700 text-white py-3 rounded-2xl text-lg font-semibold transition">

            ถ่ายรูป
        </button>

    </div>

    <!-- SEND -->
    <button
        id="btnSend"
        class="w-full mt-4 bg-red-600 hover:bg-red-700 text-white py-3 rounded-2xl text-lg font-semibold transition">

        ส่งกลับ Apps Script
    </button>

    <!-- STATUS -->
    <div
        id="status"
        class="text-center text-gray-600 mt-4">
    </div>

</div>

<script>

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const preview = document.getElementById('preview');
const statusText = document.getElementById('status');

const btnStart = document.getElementById('btnStart');
const btnCapture = document.getElementById('btnCapture');
const btnSend = document.getElementById('btnSend');

let imageBase64 = '';
let stream = null;


// ==============================
// START CAMERA
// ==============================

btnStart.addEventListener('click', async () => {

    try{

        statusText.innerHTML = 'กำลังเปิดกล้อง...';

        stream = await navigator.mediaDevices.getUserMedia({
            video:{
                facingMode:'environment',
                width:{ideal:1280},
                height:{ideal:720}
            },
            audio:false
        });

        video.srcObject = stream;

        statusText.innerHTML = 'เปิดกล้องสำเร็จ';

    }catch(err){

        console.error(err);

        statusText.innerHTML =
        'ไม่สามารถเปิดกล้องได้';

        alert(
            'เปิดกล้องไม่สำเร็จ\n\n' +
            err.message
        );
    }

});


// ==============================
// CAPTURE PHOTO
// ==============================

btnCapture.addEventListener('click', () => {

    if(!video.srcObject){

        alert('กรุณาเปิดกล้องก่อน');
        return;
    }

    const ctx = canvas.getContext('2d');

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
    );

    imageBase64 =
    canvas.toDataURL(
        'image/jpeg',
        0.9
    );

    preview.src = imageBase64;

    preview.classList.remove('hidden');

    statusText.innerHTML =
    'ถ่ายรูปสำเร็จ';

});


// ==============================
// SEND TO APPS SCRIPT
// ==============================

btnSend.addEventListener('click', () => {

    if(!imageBase64){

        alert('กรุณาถ่ายรูปก่อน');
        return;
    }

    // ส่งกลับหน้าแม่ (Apps Script)

    if(window.opener){

        window.opener.postMessage({

            type:'camera-result',

            image:imageBase64,

            time:new Date().toISOString()

        }, '*');

        statusText.innerHTML =
        'ส่งข้อมูลกลับแล้ว';

        // ปิดหน้ากล้อง

        setTimeout(() => {

            window.close();

        }, 1000);

    }else{

        // กรณีเปิดเดี่ยว

        statusText.innerHTML =
        'ไม่ได้เปิดจาก Apps Script';

        console.log(imageBase64);
    }

});


// ==============================
// AUTO START ON MOBILE
// ==============================

window.addEventListener('load', () => {

    // มือถือบางเครื่องต้อง interaction ก่อน
    // จึงไม่ auto start จริง

    statusText.innerHTML =
    'กด "เปิดกล้อง" เพื่อเริ่มใช้งาน';

});


// ==============================
// STOP CAMERA WHEN EXIT
// ==============================

window.addEventListener('beforeunload', () => {

    if(stream){

        stream.getTracks().forEach(track => {

            track.stop();

        });
    }

});

</script>

</body>
</html>
